<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - RentNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body {
            background-color: var(--bg-alt);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card {
            background: var(--bg-surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            animation: slideUp 0.5s ease-out;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <h1 class="font-bold" style="font-size: 1.5rem;">Quên mật khẩu?</h1>
            <p class="text-muted text-sm mt-2">Nhập email hoặc số điện thoại của bạn và chúng tôi sẽ gửi cho bạn mã OTP
                để đặt lại mật khẩu.</p>
        </div>
        <form class="needs-validation" onsubmit="event.preventDefault(); window.location.href='reset-password.html'">
            <div class="form-group">
                <label class="form-label">Email hoặc Số điện thoại</label>
                <input type="text" class="form-control" placeholder="Nhập để nhận mã OTP" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg mt-4">Gửi Mã Xác Nhận</button>
            <div class="text-center mt-4">
                <a href="login.html" class="text-primary text-sm font-semibold"><i class="fas fa-arrow-left"></i> Quay
                    lại đăng nhập</a>
            </div>
        </form>
    </div>
    <script src="assets/js/main.js"></script>
</body>

</html>
