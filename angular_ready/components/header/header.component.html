<header class="navbar">
    <div class="container d-flex justify-content-between align-items-center">
        <a routerLink="/" class="navbar-brand">
            <i class="fas fa-home"></i> RentNest
        </a>

        <button class="hamburger" (click)="toggleMenu()">
            <i class="fas fa-bars"></i>
        </button>

        <nav class="navbar-menu d-flex align-items-center" [class.active]="isMenuOpen">
            <ul class="navbar-nav">
                <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}"
                        class="nav-link">Trang chủ</a></li>
                <li><a routerLink="/rooms" routerLinkActive="active" class="nav-link">Xem Phòng</a></li>
                <li><a routerLink="/pricing" routerLinkActive="active" class="nav-link">Bảng giá Dịch vụ</a></li>
                <li><a routerLink="/contact" routerLinkActive="active" class="nav-link">Liên hệ</a></li>
            </ul>
            <div class="nav-actions d-flex gap-2">
                <a routerLink="/login" class="btn btn-outline btn-sm">Đăng nhập</a>
                <a routerLink="/register" class="btn btn-primary btn-sm">Đăng ký</a>
            </div>
        </nav>
    </div>
</header>
