<header class="admin-header">
    <div class="d-flex align-items-center gap-3">
        <!-- Event bound to toggle sidebar in parent -->
        <button class="btn btn-icon d-lg-none" (click)="toggleSidebar.emit()"><i class="fas fa-bars"></i></button>
        <h2 class="m-0 font-semibold" style="font-size: 1.25rem;">{{ title }}</h2>
    </div>
    <div class="d-flex align-items-center gap-3">
        <span class="text-xs text-muted d-none d-md-block"><i class="fas fa-database text-success"></i> Redis Cache:
            Active</span>
        <button class="btn btn-icon position-relative">
            <i class="far fa-bell"></i>
            <span class="position-absolute top-0 right-0 badge badge-danger rounded-circle p-1"
                style="width: 10px; height: 10px;"></span>
        </button>
        <div class="d-flex align-items-center gap-2">
            <img src="https://ui-avatars.com/api/?name=Admin&background=0F52BA&color=fff" alt="Admin"
                style="width: 32px; height: 32px; border-radius: 50%;">
            <span class="font-medium text-sm d-none d-md-block">Admin Manager</span>
        </div>
    </div>
</header>
