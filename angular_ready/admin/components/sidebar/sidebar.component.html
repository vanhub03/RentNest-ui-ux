<aside class="sidebar" [class.show]="isSidebarOpen">
    <div class="sidebar-header">
        <i class="fas fa-home text-primary"></i> RentNest Admin
    </div>
    <nav class="sidebar-nav">
        <div class="px-3 mb-2 text-xs font-semibold text-muted text-uppercase tracking-wider">Tổng quan</div>
        <a routerLink="/admin/dashboard" routerLinkActive="active" class="sidebar-link"><i
                class="fas fa-chart-line"></i> Dashboard</a>

        <div class="px-3 mt-4 mb-2 text-xs font-semibold text-muted text-uppercase tracking-wider">Quản lý Dữ liệu</div>
        <a routerLink="/admin/rooms" routerLinkActive="active" class="sidebar-link"><i class="fas fa-door-open"></i>
            Phòng & Giường</a>
        <a routerLink="/admin/tenants" routerLinkActive="active" class="sidebar-link"><i class="fas fa-users"></i> Khách
            Thuê</a>
        <a routerLink="/admin/contracts" routerLinkActive="active" class="sidebar-link"><i
                class="fas fa-file-signature"></i> Hợp Đồng</a>

        <div class="px-3 mt-4 mb-2 text-xs font-semibold text-muted text-uppercase tracking-wider">Tài chính</div>
        <a routerLink="/admin/services" routerLinkActive="active" class="sidebar-link"><i class="fas fa-plug"></i> Dịch
            Vụ & Điện Nước</a>
        <a routerLink="/admin/invoices" routerLinkActive="active" class="sidebar-link"><i
                class="fas fa-file-invoice-dollar"></i> Hóa Đơn</a>
        <a routerLink="/admin/reports" routerLinkActive="active" class="sidebar-link"><i class="fas fa-chart-bar"></i>
            Báo Cáo</a>

        <div class="px-3 mt-4 mb-2 text-xs font-semibold text-muted text-uppercase tracking-wider">Hệ thống</div>
        <a routerLink="/admin/email-templates" routerLinkActive="active" class="sidebar-link"><i
                class="fas fa-envelope-open-text"></i> Mẫu Email</a>
        <a routerLink="/admin/settings" routerLinkActive="active" class="sidebar-link"><i class="fas fa-cog"></i> Cài
            Đặt</a>
    </nav>
    <div class="p-3 border-top" style="border-color: rgba(255,255,255,0.1);">
        <a routerLink="/login" class="sidebar-link text-danger p-2"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
    </div>
</aside>
