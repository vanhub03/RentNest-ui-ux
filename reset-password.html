<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Lại Mật Khẩu - RentNest</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <style>
        body {
            background-color: var(--bg-alt);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .auth-card {
            background: var(--bg-surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            width: 100%;
            max-width: 450px;
            padding: 2.5rem;
            animation: slideUp 0.5s ease-out;
        }
    </style>
</head>

<body>
    <div class="auth-card">
        <div class="text-center mb-4">
            <h1 class="font-bold" style="font-size: 1.5rem;">Cập Nhật Mật Khẩu</h1>
            <p class="text-muted text-sm mt-2">Vui lòng nhập mã OTP đã được gửi và nhập mật khẩu mới.</p>
        </div>
        <form class="needs-validation" onsubmit="event.preventDefault(); window.location.href='login.html'">
            <div class="form-group">
                <label class="form-label">Mã xác thực (OTP)</label>
                <div class="d-flex gap-2">
                    <input type="text" maxlength="1" class="form-control text-center text-lg font-bold" required>
                    <input type="text" maxlength="1" class="form-control text-center text-lg font-bold" required>
                    <input type="text" maxlength="1" class="form-control text-center text-lg font-bold" required>
                    <input type="text" maxlength="1" class="form-control text-center text-lg font-bold" required>
                    <input type="text" maxlength="1" class="form-control text-center text-lg font-bold" required>
                    <input type="text" maxlength="1" class="form-control text-center text-lg font-bold" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Mật khẩu mới</label>
                <input type="password" class="form-control" placeholder="Ít nhất 8 ký tự" required>
            </div>
            <div class="form-group">
                <label class="form-label">Xác nhận mật khẩu</label>
                <input type="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-lg mt-4">Lưu Mật Khẩu Mới</button>
            <div class="text-center mt-3 text-sm">
                Không nhận được mã? <a href="#" class="text-primary font-semibold">Gửi lại</a>
            </div>
        </form>
    </div>
    <script src="assets/js/main.js"></script>
    <script>
        // Mock auto focus for OTP inputs
        const inputs = document.querySelectorAll('.form-group .d-flex input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                if (input.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
</body>

</html>
