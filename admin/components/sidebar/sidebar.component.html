<aside class="sidebar" style="background-color: #0F172A;" [class.show]="isSidebarOpen">
    <div class="sidebar-header border-bottom" style="border-color: rgba(255,255,255,0.05) !important;">
        <i class="fas fa-shield-alt text-primary"></i> RentNest System
    </div>
    <nav class="sidebar-nav">
        <div class="px-3 mb-2 text-xs font-semibold text-muted text-uppercase tracking-wider">Tổng quan</div>
        <a routerLink="/superadmin/dashboard" routerLinkActive="active" class="sidebar-link"><i
                class="fas fa-satellite-dish"></i> Hệ thống</a>

        <div class="px-3 mt-4 mb-2 text-xs font-semibold text-muted text-uppercase tracking-wider">Tài khoản</div>
        <a routerLink="/superadmin/users" routerLinkActive="active" class="sidebar-link"><i
                class="fas fa-user-shield"></i> Users & Chủ Nhà <span *ngIf="pendingKyc > 0"
                class="badge badge-danger ml-auto">{{pendingKyc}} mới</span></a>

        <div class="px-3 mt-4 mb-2 text-xs font-semibold text-muted text-uppercase tracking-wider">Kinh doanh</div>
        <a routerLink="/superadmin/hostels" routerLinkActive="active" class="sidebar-link"><i
                class="fas fa-building"></i> Danh sách Dự Án</a>
        <a routerLink="/superadmin/pricing-plans" routerLinkActive="active" class="sidebar-link"><i
                class="fas fa-tags"></i> Gói Dịch Vụ SaaS</a>

        <div class="px-3 mt-4 mb-2 text-xs font-semibold text-muted text-uppercase tracking-wider">Cấu hình</div>
        <a routerLink="/superadmin/email-templates" routerLinkActive="active" class="sidebar-link"><i
                class="fas fa-envelope-open-text"></i> Mẫu Email</a>
        <a routerLink="/superadmin/settings" routerLinkActive="active" class="sidebar-link"><i class="fas fa-cogs"></i>
            System Settings</a>
    </nav>
    <div class="p-3 border-top" style="border-color: rgba(255,255,255,0.05);">
        <a routerLink="/login" class="sidebar-link text-danger p-2"><i class="fas fa-sign-out-alt"></i> Đăng xuất</a>
    </div>
</aside>
